		<title>Epigraph</title>

	<body epub:type="frontmatter">
		<section id="epigraph" epub:type="epigraph">
			<blockquote>
				<p>
					<span class="i0">FAUST. <i>Und du, wer bist du</i>?</span>
					<span class="i0">SORGE. <i>Bin einmal da</i>.</span>
					<span class="i0">FAUST. <i>Entferne dich</i>!</span>
					<span class="i0">SORGE. <i>Ich bin am rechten Ort</i>.</span>
				</p>
				<cite>
					<span class="i16">Faust. Teil II. Akt V.</span>
				</cite>
			</blockquote>
		</section>
	</body>
